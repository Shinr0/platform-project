<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Engineering Portal</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface-hover: #22263a;
            --border: #2a2e3f;
            --primary: #6c63ff;
            --primary-hover: #5a52e0;
            --danger: #e74c3c;
            --danger-hover: #c0392b;
            --success: #27ae60;
            --warning: #f39c12;
            --text: #e4e6eb;
            --text-muted: #8b8fa3;
            --radius: 10px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo svg { width: 32px; height: 32px; }
        .logo h1 { font-size: 1.2rem; font-weight: 600; }
        .logo span { color: var(--primary); }
        .settings-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .settings-btn:hover { border-color: var(--primary); color: var(--text); }

        main { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 24px;
        }
        .card h2 {
            font-size: 1.1rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card h2 .badge {
            font-size: 0.7rem;
            background: var(--primary);
            color: #fff;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        input, select {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            outline: none;
        }
        input:focus, select:focus { border-color: var(--primary); }
        input::placeholder { color: var(--text-muted); }
        select option { background: var(--surface); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--primary); color: #fff; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .form-actions { margin-top: 20px; display: flex; gap: 12px; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 20px;
            border-radius: var(--radius);
            color: #fff;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 1000;
            transform: translateY(120%);
            opacity: 0;
            transition: all 0.3s ease;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { background: var(--success); }
        .toast.error { background: var(--danger); }
        .toast.info { background: var(--primary); }

        .vm-list { display: flex; flex-direction: column; gap: 8px; }
        .vm-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: border-color 0.2s;
        }
        .vm-item:hover { border-color: var(--primary); }
        .vm-info { display: flex; flex-direction: column; gap: 4px; }
        .vm-name { font-weight: 600; font-size: 0.95rem; }
        .vm-meta { font-size: 0.8rem; color: var(--text-muted); display: flex; gap: 16px; }
        .vm-actions { display: flex; gap: 8px; }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }
        .empty-state p { margin-top: 8px; font-size: 0.9rem; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-bar {
            height: 2px;
            background: var(--primary);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 999;
            transition: width 0.3s;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            width: 420px;
            max-width: 90vw;
        }
        .modal h3 { margin-bottom: 16px; }
        .modal .form-group { margin-bottom: 12px; }
        .modal .form-actions { justify-content: flex-end; }
        .modal .btn-ghost {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .run-status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 500;
        }
        .run-status.completed { background: rgba(39,174,96,0.15); color: var(--success); }
        .run-status.in_progress { background: rgba(243,156,18,0.15); color: var(--warning); }
        .run-status.queued { background: rgba(108,99,255,0.15); color: var(--primary); }
        .run-status.failure { background: rgba(231,76,60,0.15); color: var(--danger); }

        .runs-list { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
        .run-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .run-item a { color: var(--primary); text-decoration: none; }
        .run-item a:hover { text-decoration: underline; }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            header { padding: 12px 16px; }
            main { padding: 16px; }
        }
    </style>
</head>
<body>

<div class="loading-bar" id="loadingBar" style="width: 0%"></div>

<header>
    <div class="logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="32" height="32" rx="8" fill="#6c63ff" fill-opacity="0.15"/>
            <path d="M8 12L16 7L24 12V20L16 25L8 20V12Z" stroke="#6c63ff" stroke-width="1.5" fill="none"/>
            <circle cx="16" cy="16" r="3" fill="#6c63ff"/>
        </svg>
        <h1>Platform <span>Engineering</span></h1>
    </div>
    <button class="settings-btn" onclick="openSettings()">Settings</button>
</header>

<main>
    <div class="card">
        <h2>Create VM <span class="badge">GCP Compute Engine</span></h2>
        <form id="createVmForm" onsubmit="return handleCreateVm(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label for="vmName">VM Name</label>
                    <input type="text" id="vmName" placeholder="my-dev-server" required
                           pattern="^[a-z][a-z0-9-]{2,62}$"
                           title="Lowercase letters, numbers, hyphens. 3-63 chars. Must start with a letter.">
                </div>
                <div class="form-group">
                    <label for="machineType">Machine Type</label>
                    <select id="machineType">
                        <option value="e2-micro">e2-micro (2 vCPU, 1 GB)</option>
                        <option value="e2-small">e2-small (2 vCPU, 2 GB)</option>
                        <option value="e2-medium">e2-medium (2 vCPU, 4 GB)</option>
                        <option value="n1-standard-1">n1-standard-1 (1 vCPU, 3.75 GB)</option>
                        <option value="n1-standard-2">n1-standard-2 (2 vCPU, 7.5 GB)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="zone">Zone</label>
                    <select id="zone">
                        <option value="europe-west1-b">europe-west1-b (Belgium)</option>
                        <option value="europe-west1-c">europe-west1-c (Belgium)</option>
                        <option value="europe-west1-d">europe-west1-d (Belgium)</option>
                        <option value="us-central1-a">us-central1-a (Iowa)</option>
                        <option value="us-east1-b">us-east1-b (S. Carolina)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="diskSize">Boot Disk (GB)</label>
                    <input type="number" id="diskSize" value="20" min="10" max="500">
                </div>
                <div class="form-group">
                    <label for="dataDiskSize">Data Disk (GB)</label>
                    <input type="number" id="dataDiskSize" value="0" min="0" max="500"
                           title="0 = no extra disk">
                </div>
                <div class="form-group" style="display:flex;gap:24px;align-items:center;padding-top:22px">
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                        <input type="checkbox" id="spotVm" style="width:18px;height:18px;accent-color:var(--primary)">
                        Spot VM
                    </label>
                    <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
                        <input type="checkbox" id="staticIp" style="width:18px;height:18px;accent-color:var(--primary)">
                        Static IP
                    </label>
                </div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="createBtn">
                    Create VM
                </button>
            </div>
        </form>
    </div>

    <div class="card">
        <h2>Active VMs</h2>
        <div id="vmList" class="vm-list">
            <div class="empty-state">
                <p>Loading VMs...</p>
            </div>
        </div>
    </div>

    <div class="card">
        <h2>Recent Workflow Runs</h2>
        <div id="runsList" class="runs-list">
            <div class="empty-state"><p>Loading runs...</p></div>
        </div>
    </div>
</main>

<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <h3>Settings</h3>
        <div class="form-group">
            <label for="ghToken">GitHub Personal Access Token</label>
            <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="form-group">
            <label for="ghRepo">Repository (owner/repo)</label>
            <input type="text" id="ghRepo" placeholder="username/platform-engineering">
        </div>
        <div class="form-actions">
            <button class="btn btn-ghost" onclick="closeSettings()">Cancel</button>
            <button class="btn btn-primary" onclick="saveSettings()">Save</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKFLOW_CREATE = 'create-vm.yml';
const WORKFLOW_DELETE = 'delete-vm.yml';

function getConfig() {
    return {
        token: localStorage.getItem('gh_token') || '',
        repo: localStorage.getItem('gh_repo') || '',
    };
}

function ghHeaders() {
    const { token } = getConfig();
    return {
        'Accept': 'application/vnd.github+json',
        'Authorization': `Bearer ${token}`,
        'X-GitHub-Api-Version': '2022-11-28',
    };
}

function showToast(message, type = 'info') {
    const t = document.getElementById('toast');
    t.textContent = message;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 4000);
}

function setLoading(active) {
    const bar = document.getElementById('loadingBar');
    if (active) {
        bar.style.transition = 'width 8s ease-out';
        bar.style.width = '90%';
    } else {
        bar.style.transition = 'width 0.3s';
        bar.style.width = '100%';
        setTimeout(() => {
            bar.style.transition = 'none';
            bar.style.width = '0%';
        }, 300);
    }
}

function openSettings() {
    const { token, repo } = getConfig();
    document.getElementById('ghToken').value = token;
    document.getElementById('ghRepo').value = repo;
    document.getElementById('settingsModal').classList.add('active');
}

function closeSettings() {
    document.getElementById('settingsModal').classList.remove('active');
}

function saveSettings() {
    localStorage.setItem('gh_token', document.getElementById('ghToken').value.trim());
    localStorage.setItem('gh_repo', document.getElementById('ghRepo').value.trim());
    closeSettings();
    showToast('Settings saved', 'success');
    loadVMs();
    loadRuns();
}

async function triggerWorkflow(workflowFile, inputs) {
    const { repo, token } = getConfig();
    if (!repo || !token) { showToast('Configure repository and token in Settings first', 'error'); return false; }

    const url = `https://api.github.com/repos/${repo}/actions/workflows/${workflowFile}/dispatches`;
    console.log('[Platform] Triggering workflow:', url, inputs);

    const stringInputs = {};
    for (const [k, v] of Object.entries(inputs)) {
        stringInputs[k] = String(v);
    }

    const resp = await fetch(url, {
        method: 'POST',
        headers: ghHeaders(),
        body: JSON.stringify({ ref: 'main', inputs: stringInputs }),
    });
    console.log('[Platform] Response status:', resp.status);
    if (resp.status === 204) return true;
    const body = await resp.text();
    console.error('[Platform] Error response:', body);
    let msg;
    try { msg = JSON.parse(body).message; } catch { msg = body; }
    throw new Error(msg || `HTTP ${resp.status}`);
}

async function handleCreateVm(e) {
    e.preventDefault();
    const { token, repo } = getConfig();
    if (!token || !repo) { openSettings(); showToast('Configure Settings first', 'error'); return false; }

    const btn = document.getElementById('createBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating...';
    setLoading(true);

    try {
        await triggerWorkflow(WORKFLOW_CREATE, {
            vm_name: document.getElementById('vmName').value.trim(),
            machine_type: document.getElementById('machineType').value,
            zone: document.getElementById('zone').value,
            disk_size_gb: document.getElementById('diskSize').value,
            spot: document.getElementById('spotVm').checked,
            static_ip: document.getElementById('staticIp').checked,
            data_disk_size_gb: document.getElementById('dataDiskSize').value,
        });
        showToast('VM creation triggered! ArgoCD will sync shortly.', 'success');
        document.getElementById('vmName').value = '';
        setTimeout(() => { loadRuns(); loadVMs(); }, 3000);
    } catch (err) {
        showToast(`Error: ${err.message}`, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Create VM';
        setLoading(false);
    }
    return false;
}

async function deleteVm(vmName) {
    if (!confirm(`Delete VM "${vmName}"? This will destroy the GCP instance.`)) return;
    setLoading(true);
    try {
        await triggerWorkflow(WORKFLOW_DELETE, { vm_name: vmName });
        showToast(`Deletion of "${vmName}" triggered.`, 'success');
        setTimeout(() => { loadRuns(); loadVMs(); }, 3000);
    } catch (err) {
        showToast(`Error: ${err.message}`, 'error');
    } finally {
        setLoading(false);
    }
}

async function loadVMs() {
    const { repo, token } = getConfig();
    const container = document.getElementById('vmList');
    if (!repo || !token) {
        container.innerHTML = '<div class="empty-state"><p>Configure GitHub settings to view VMs.</p></div>';
        return;
    }

    try {
        const resp = await fetch(`https://api.github.com/repos/${repo}/contents/crossplane/claims`, {
            headers: ghHeaders(),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const files = await resp.json();
        const claims = files.filter(f => f.name.endsWith('.yaml') && f.name !== '.gitkeep');

        if (claims.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>No VMs deployed yet. Create one above.</p></div>';
            return;
        }

        const vmsHtml = await Promise.all(claims.map(async (file) => {
            const name = file.name.replace('.yaml', '');
            let meta = '';
            try {
                const contentResp = await fetch(file.download_url, { headers: ghHeaders() });
                const yamlText = await contentResp.text();
                const machineMatch = yamlText.match(/machineType:\s*(\S+)/);
                const zoneMatch = yamlText.match(/zone:\s*(\S+)/);
                const spotMatch = yamlText.match(/spot:\s*(true)/);
                const ipMatch = yamlText.match(/staticIp:\s*(true)/);
                const diskMatch = yamlText.match(/dataDiskSizeGb:\s*(\d+)/);
                if (machineMatch) meta += machineMatch[1];
                if (zoneMatch) meta += ` &middot; ${zoneMatch[1]}`;
                if (spotMatch) meta += ' &middot; Spot';
                if (ipMatch) meta += ' &middot; Static IP';
                if (diskMatch && diskMatch[1] !== '0') meta += ` &middot; +${diskMatch[1]}GB data`;
            } catch { /* ignore */ }
            return `
                <div class="vm-item">
                    <div class="vm-info">
                        <span class="vm-name">${name}</span>
                        <span class="vm-meta">${meta || 'Compute Engine'}</span>
                    </div>
                    <div class="vm-actions">
                        <button class="btn btn-danger btn-sm" onclick="deleteVm('${name}')">Delete</button>
                    </div>
                </div>`;
        }));
        container.innerHTML = vmsHtml.join('');
    } catch (err) {
        container.innerHTML = `<div class="empty-state"><p>Error loading VMs: ${err.message}</p></div>`;
    }
}

async function loadRuns() {
    const { repo, token } = getConfig();
    const container = document.getElementById('runsList');
    if (!repo || !token) {
        container.innerHTML = '<div class="empty-state"><p>Configure GitHub settings to view runs.</p></div>';
        return;
    }

    try {
        const resp = await fetch(
            `https://api.github.com/repos/${repo}/actions/runs?per_page=8`,
            { headers: ghHeaders() }
        );
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();

        if (!data.workflow_runs || data.workflow_runs.length === 0) {
            container.innerHTML = '<div class="empty-state"><p>No workflow runs yet.</p></div>';
            return;
        }

        container.innerHTML = data.workflow_runs.map(run => {
            const status = run.conclusion || run.status;
            const date = new Date(run.created_at).toLocaleString('fr-FR');
            return `
                <div class="run-item">
                    <span>
                        <a href="${run.html_url}" target="_blank">${run.name}</a>
                        &middot; ${date}
                    </span>
                    <span class="run-status ${status}">${status}</span>
                </div>`;
        }).join('');
    } catch (err) {
        container.innerHTML = `<div class="empty-state"><p>Error loading runs: ${err.message}</p></div>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    const { token, repo } = getConfig();
    if (!token || !repo) {
        setTimeout(openSettings, 500);
    } else {
        loadVMs();
        loadRuns();
    }
});

document.getElementById('settingsModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeSettings();
});
</script>

</body>
</html>
