apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vm-gcp-compute
  labels:
    crossplane.io/xrd: xvirtualmachines.compute.platform.local
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: compute.platform.local/v1alpha1
    kind: XVirtualMachine
  mode: Pipeline
  pipeline:
    - step: render-resources
      functionRef:
        name: function-go-templating
      input:
        apiVersion: gotemplating.fn.crossplane.io/v1beta1
        kind: GoTemplate
        source: Inline
        inline:
          template: |
            {{- $params := .observed.composite.resource.spec.parameters }}
            {{- $vmName := $params.vmName }}
            {{- $zone := $params.zone | default "europe-west1-b" }}
            {{- $machineType := $params.machineType | default "e2-micro" }}
            {{- $diskSizeGb := $params.diskSizeGb | default 20 }}
            {{- $imageFamily := $params.imageFamily | default "debian-12" }}
            {{- $spot := $params.spot | default false }}
            {{- $staticIp := $params.staticIp | default false }}
            {{- $dataDiskSizeGb := $params.dataDiskSizeGb | default 0 }}
            {{- $region := regexReplaceAll "-[a-z]$" $zone "" }}
            ---
            apiVersion: compute.gcp.upbound.io/v1beta1
            kind: Instance
            metadata:
              annotations:
                crossplane.io/external-name: {{ $vmName }}
                gotemplating.fn.crossplane.io/composition-resource-name: compute-instance
              labels:
                resource: compute-instance
            spec:
              forProvider:
                zone: {{ $zone }}
                machineType: {{ $machineType }}
                bootDisk:
                  - initializeParams:
                      - image: projects/debian-cloud/global/images/family/{{ $imageFamily }}
                        size: {{ $diskSizeGb }}
                networkInterface:
                  - network: default
                    accessConfig:
                      - networkTier: STANDARD
                scheduling:
                  - preemptible: {{ $spot }}
                    automaticRestart: {{ not $spot }}
                metadata:
                  managed-by: crossplane-platform-eng
                tags:
                  - platform-eng
              providerConfigRef:
                name: default
            {{- if $staticIp }}
            ---
            apiVersion: compute.gcp.upbound.io/v1beta1
            kind: Address
            metadata:
              annotations:
                crossplane.io/external-name: {{ $vmName }}-ip
                gotemplating.fn.crossplane.io/composition-resource-name: static-ip
            spec:
              forProvider:
                region: {{ $region }}
                addressType: EXTERNAL
                networkTier: STANDARD
              providerConfigRef:
                name: default
            {{- end }}
            {{- if gt (int $dataDiskSizeGb) 0 }}
            ---
            apiVersion: compute.gcp.upbound.io/v1beta1
            kind: Disk
            metadata:
              annotations:
                crossplane.io/external-name: {{ $vmName }}-data
                gotemplating.fn.crossplane.io/composition-resource-name: data-disk
              labels:
                resource: data-disk
            spec:
              forProvider:
                zone: {{ $zone }}
                size: {{ $dataDiskSizeGb }}
                type: pd-standard
              providerConfigRef:
                name: default
            ---
            apiVersion: compute.gcp.upbound.io/v1beta1
            kind: AttachedDisk
            metadata:
              annotations:
                crossplane.io/external-name: {{ $vmName }}-attach-data
                gotemplating.fn.crossplane.io/composition-resource-name: attach-data-disk
            spec:
              forProvider:
                instanceSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: compute-instance
                diskSelector:
                  matchControllerRef: true
                  matchLabels:
                    resource: data-disk
              providerConfigRef:
                name: default
            {{- end }}
