apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: vm-gcp-compute
  labels:
    crossplane.io/xrd: xvirtualmachines.compute.platform.local
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: compute.platform.local/v1alpha1
    kind: XVirtualMachine
  mode: Pipeline
  pipeline:
    - step: patch-and-transform
      functionRef:
        name: function-patch-and-transform
      input:
        apiVersion: pt.fn.crossplane.io/v1beta1
        kind: Resources
        resources:

          - name: compute-instance
            base:
              apiVersion: compute.gcp.upbound.io/v1beta1
              kind: Instance
              spec:
                forProvider:
                  zone: europe-west1-b
                  machineType: e2-micro
                  bootDisk:
                    - initializeParams:
                        - image: projects/debian-cloud/global/images/family/debian-12
                          size: 20
                  networkInterface:
                    - network: default
                      accessConfig:
                        - networkTier: STANDARD
                  scheduling:
                    - preemptible: false
                      automaticRestart: true
                  metadata:
                    managed-by: crossplane-platform-eng
                  tags:
                    - platform-eng
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.vmName
                toFieldPath: metadata.name
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.vmName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.machineType
                toFieldPath: spec.forProvider.machineType
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.zone
                toFieldPath: spec.forProvider.zone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.diskSizeGb
                toFieldPath: spec.forProvider.bootDisk[0].initializeParams[0].size
              - type: CombineFromComposite
                combine:
                  variables:
                    - fromFieldPath: spec.parameters.imageFamily
                  strategy: string
                  string:
                    fmt: "projects/debian-cloud/global/images/family/%s"
                toFieldPath: spec.forProvider.bootDisk[0].initializeParams[0].image
              # Spot VM scheduling
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.spot
                toFieldPath: spec.forProvider.scheduling[0].preemptible
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.spot
                toFieldPath: spec.forProvider.scheduling[0].automaticRestart
                transforms:
                  - type: convert
                    convert:
                      toType: string
                  - type: map
                    map:
                      "true": "false"
                      "false": "true"
                  - type: convert
                    convert:
                      toType: bool

          - name: static-ip
            base:
              apiVersion: compute.gcp.upbound.io/v1beta1
              kind: Address
              spec:
                forProvider:
                  region: europe-west1
                  addressType: EXTERNAL
                  networkTier: STANDARD
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.vmName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-ip"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.vmName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-ip"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.zone
                toFieldPath: spec.forProvider.region
                transforms:
                  - type: string
                    string:
                      type: Regexp
                      regexp:
                        match: "^(.*)-[a-z]$"
                        group: 1

          - name: data-disk
            base:
              apiVersion: compute.gcp.upbound.io/v1beta1
              kind: Disk
              spec:
                forProvider:
                  zone: europe-west1-b
                  size: 50
                  type: pd-standard
                providerConfigRef:
                  name: default
            patches:
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.vmName
                toFieldPath: metadata.name
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-data"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.vmName
                toFieldPath: metadata.annotations[crossplane.io/external-name]
                transforms:
                  - type: string
                    string:
                      type: Format
                      fmt: "%s-data"
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.zone
                toFieldPath: spec.forProvider.zone
              - type: FromCompositeFieldPath
                fromFieldPath: spec.parameters.dataDiskSizeGb
                toFieldPath: spec.forProvider.size
